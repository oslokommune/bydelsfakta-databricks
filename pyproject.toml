[dependency-groups]
test = ["pandas", "numpy", "pytest", "openpyxl"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bydelsfakta"]

[tool.ruff]
target-version = "py312"
line-length = 80

[tool.ruff.lint]
select = ["A", "E", "F", "I", "UP", "W"]
