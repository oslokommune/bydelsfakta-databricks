resources:
  jobs:
    husholdning_med_barn_alle_status:
      name: bydelsfakta-husholdning-totalt-status
      tasks:
        - task_key: husholdning_med_barn_alle_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: husholdning_med_barn
            parameters:
              - "--input-dir=${var.uploads_dir}/husholdninger-med-barn"
              - "--silver-dir=${var.silver_dir}/husholdninger-med-barn"
              - "--output-dir=${var.gold_dir}/husholdning-totalt-status"
              - "--type-of-ds=alle_status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    husholdning_med_barn_alle_historisk:
