resources:
  jobs:
    trangboddhet_alle_status:
      name: bydelsfakta-trangboddhet-alle-status
      tasks:
        - task_key: trangboddhet_alle_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: trangboddhet
            parameters:
              - "--input-dir=${var.uploads_dir}/husholdninger-etter-rom-per-person"
              - "--silver-dir=${var.silver_dir}/husholdninger-etter-rom-per-person"
              - "--output-dir=${var.gold_dir}/trangboddhet-alle-status"
              - "--type-of-ds=alle_status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    trangboddhet_alle_historisk:
