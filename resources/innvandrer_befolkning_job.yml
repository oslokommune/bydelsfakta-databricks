resources:
  jobs:
    innvandrer_befolkning_alle_status:
      name: bydelsfakta-innvandring-befolkning-alle-status
      tasks:
        - task_key: innvandrer_befolkning_alle_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: innvandrer_befolkning
            parameters:
              - "--input-dir=${var.uploads_dir}/botid"
              - "--befolkning-dir=${var.uploads_dir}/befolkning-etter-kjonn-og-alder"
              - "--silver-dir=${var.silver_dir}/innvandrer-befolkning"
              - "--output-dir=${var.gold_dir}/innvandring-befolkning-alle-status"
              - "--type-of-ds=alle_status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    innvandrer_befolkning_alle_historisk:
