resources:
  jobs:
    levekar_lav_utdanning_status:
      name: bydelsfakta-levekar-lav-utdanning-status
      tasks:
        - task_key: levekar_lav_utdanning_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: levekar_lav_utdanning
            parameters:
              - "--input-dir=${var.uploads_dir}/lav-utdanning"
              - "--silver-dir=${var.silver_dir}/lav-utdanning"
              - "--output-dir=${var.gold_dir}/levekar-lav-utdanning-status"
              - "--type-of-ds=status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    levekar_lav_utdanning_historisk:
      name: bydelsfakta-levekar-lav-utdanning-historisk
      tasks:
        - task_key: levekar_lav_utdanning_historisk
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: levekar_lav_utdanning
            parameters:
              - "--input-dir=${var.uploads_dir}/lav-utdanning"
              - "--output-dir=${var.gold_dir}/levekar-lav-utdanning-historisk"
              - "--type-of-ds=historisk"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl
