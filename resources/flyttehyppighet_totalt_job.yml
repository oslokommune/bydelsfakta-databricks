resources:
  jobs:
    flyttehyppighet_totalt_status:
      name: bydelsfakta-flyttehyppighet-totalt-status
      tasks:
        - task_key: flyttehyppighet_totalt_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: flyttehyppighet_totalt
            parameters:
              - "--fra-dir=${var.uploads_dir}/flytting-fra-etter-alder"
              - "--til-dir=${var.uploads_dir}/flytting-til-etter-alder"
              - "--silver-dir=${var.silver_dir}/flyttehyppighet-totalt"
              - "--output-dir=${var.gold_dir}/flyttehyppighet-totalt-status"
              - "--type-of-ds=status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    flyttehyppighet_totalt_historisk:
      name: bydelsfakta-flyttehyppighet-totalt-historisk
      tasks:
        - task_key: flyttehyppighet_totalt_historisk
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: flyttehyppighet_totalt
            parameters:
              - "--fra-dir=${var.uploads_dir}/flytting-fra-etter-alder"
              - "--til-dir=${var.uploads_dir}/flytting-til-etter-alder"
              - "--output-dir=${var.gold_dir}/flyttehyppighet-totalt-historisk"
              - "--type-of-ds=historisk"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl
