resources:
  jobs:
    bygningstyper_alle_status:
      name: bydelsfakta-bygningstyper-alle-status
      tasks:
        - task_key: bygningstyper_alle_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: bygningstyper
            parameters:
              - "--input-dir=${var.uploads_dir}/boligmengde-etter-boligtype"
              - "--silver-dir=${var.silver_dir}/boligmengde-etter-boligtype"
              - "--output-dir=${var.gold_dir}/bygningstyper-alle-status"
              - "--type-of-ds=alle_status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    bygningstyper_alle_historisk:
