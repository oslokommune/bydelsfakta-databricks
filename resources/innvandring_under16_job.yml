resources:
  jobs:
    innvandring_under16_innvandrer_status:
      name: bydelsfakta-innvandring-under-16-innvandrer-status
      tasks:
        - task_key: innvandring_under16_innvandrer_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: innvandring_under16
            parameters:
              - "--input-dir=${var.uploads_dir}/innvandrer-befolkningen-0-15-ar"
              - "--silver-dir=${var.silver_dir}/innvandrer-befolkningen-0-15-ar"
              - "--output-dir=${var.gold_dir}/innvandring-under-16-innvandrer-status"
              - "--type-of-ds=innvandrer_status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

