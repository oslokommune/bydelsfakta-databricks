resources:
  jobs:
    levekar_ikke_sysselsatte_status:
      name: bydelsfakta-levekar-ikke-sysselsatte-status
      tasks:
        - task_key: levekar_ikke_sysselsatte_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: levekar_ikke_sysselsatte
            parameters:
              - "--input-dir=${var.uploads_dir}/sysselsatte"
              - "--befolkning-dir=${var.uploads_dir}/befolkning-etter-kjonn-og-alder"
              - "--silver-dir=${var.silver_dir}/levekar-ikke-sysselsatte"
              - "--output-dir=${var.gold_dir}/levekar-ikke-sysselsatte-status"
              - "--type-of-ds=status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    levekar_ikke_sysselsatte_historisk:
      name: bydelsfakta-levekar-ikke-sysselsatte-historisk
      tasks:
        - task_key: levekar_ikke_sysselsatte_historisk
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: levekar_ikke_sysselsatte
            parameters:
              - "--input-dir=${var.uploads_dir}/sysselsatte"
              - "--befolkning-dir=${var.uploads_dir}/befolkning-etter-kjonn-og-alder"
              - "--output-dir=${var.gold_dir}/levekar-ikke-sysselsatte-historisk"
              - "--type-of-ds=historisk"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl
