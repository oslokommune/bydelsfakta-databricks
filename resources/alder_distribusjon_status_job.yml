resources:
  jobs:
    alder_distribusjon_status:
      name: bydelsfakta-alder-distribusjon-status
      tasks:
        - task_key: alder_distribusjon_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: alder_distribusjon_status
            parameters:
              - "--input-dir=${var.uploads_dir}/befolkning-etter-kjonn-og-alder"
              - "--silver-dir=${var.silver_dir}/befolkning-etter-kjonn-og-alder"
              - "--output-dir=${var.gold_dir}/alder-distribusjon-status"
              - "--type-of-ds=status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl
