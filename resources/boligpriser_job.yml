resources:
  jobs:
    boligpriser_status:
      name: bydelsfakta-boligpriser-status
      tasks:
        - task_key: boligpriser_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: boligpriser
            parameters:
              - "--input-dir=${var.uploads_dir}/boligpriser-blokkleiligheter"
              - "--silver-dir=${var.silver_dir}/boligpriser-blokkleiligheter"
              - "--output-dir=${var.gold_dir}/boligpriser-blokkleiligheter-status"
              - "--type-of-ds=status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    boligpriser_historisk:
      name: bydelsfakta-boligpriser-historisk
      tasks:
        - task_key: boligpriser_historisk
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: boligpriser
            parameters:
              - "--input-dir=${var.uploads_dir}/boligpriser-blokkleiligheter"
              - "--output-dir=${var.gold_dir}/boligpriser-blokkleiligheter-historisk"
              - "--type-of-ds=historisk"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl
