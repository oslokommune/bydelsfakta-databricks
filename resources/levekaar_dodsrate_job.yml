resources:
  jobs:
    levekaar_dodsrate_status:
      name: bydelsfakta-levekaar-dodsrate-status
      tasks:
        - task_key: levekaar_dodsrate_status
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: levekaar_dodsrate
            parameters:
              - "--input-dir=${var.uploads_dir}/dodsrater"
              - "--silver-dir=${var.silver_dir}/dodsrater"
              - "--output-dir=${var.gold_dir}/levekaar-dodsrate-status"
              - "--type-of-ds=status"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl

    levekaar_dodsrate_historisk:
      name: bydelsfakta-levekaar-dodsrate-historisk
      tasks:
        - task_key: levekaar_dodsrate_historisk
          timeout_seconds: 600
          python_wheel_task:
            package_name: bydelsfakta_databricks
            entry_point: levekaar_dodsrate
            parameters:
              - "--input-dir=${var.uploads_dir}/dodsrater"
              - "--output-dir=${var.gold_dir}/levekaar-dodsrate-historisk"
              - "--type-of-ds=historisk"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - ../dist/*.whl
              - ../dist/deps/*.whl
